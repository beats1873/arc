services:
  bot:
    build: .
    restart: always
    env_file: .env
    environment:
      - MONGO_URI=mongodb://mongo:27017/arcturus
    ports:
      - "${DASHBOARD_PORT:-3001}:${DASHBOARD_PORT:-3001}"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      mongo:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo_data:
